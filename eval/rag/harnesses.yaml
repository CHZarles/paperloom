harnesses:
  - id: current-evidence-ledger
    name: Current Evidence Ledger
    description: Router plus deterministic-first planner, adaptive hybrid retrieval, evidence ledger, and verifier.
    retrieval: adaptive-hybrid
    planner: deterministic-first
    verifier: enabled
    status: runnable
    benchmarkIds: product-rescue-smoke,product-figure-table-smoke,qasper-dev-200,litsearch-full,litsearch-service-slice-k5
  - id: keyword-only-baseline
    name: Keyword Only Baseline
    description: Offline keyword/BM25-style retrieval baseline for LitSearch; product-chat answer harness is still planned.
    retrieval: keyword
    planner: none
    verifier: disabled
    status: runnable-litsearch
    benchmarkIds: litsearch-full
  - id: facet-paper-baseline
    name: Facet Paper Baseline
    description: Offline LitSearch baseline that rewards query-facet coverage in title and abstract while capping body-term repetition.
    retrieval: paper-facet
    planner: none
    verifier: disabled
    status: runnable-litsearch
    benchmarkIds: litsearch-full
  - id: service-backed-page-window
    name: Service Backed Page Window
    description: Production PaperRetrievalService followed by deterministic page-window inspection and evidence-ledger packing.
    retrieval: hybrid-plus-page-window
    planner: scientific-qa
    verifier: enabled
    status: runnable-paper-qa
    benchmarkIds: product-rescue-paper-qa,qasper-dev-200
  - id: service-backed-scoped-page-window
    name: Service Backed Scoped Page Window
    description: Scoped-paper MySQL page locator followed by deterministic page-window inspection and evidence-ledger packing.
    retrieval: scoped-paper-page-window
    planner: scientific-qa
    verifier: enabled
    status: runnable-paper-qa
    benchmarkIds: product-rescue-paper-qa,qasper-dev-200
  - id: service-backed-scoped-diverse-window
    name: Service Backed Scoped Diverse Window
    description: Scoped-paper MySQL page locator with non-overlapping page-window selection before deterministic inspection.
    retrieval: scoped-paper-diverse-window
    planner: scientific-qa-diverse-windows
    verifier: enabled
    status: runnable-paper-qa
    benchmarkIds: product-rescue-paper-qa,qasper-dev-200
  - id: service-backed-scoped-diverse-window-k5
    name: Service Backed Scoped Diverse Window K5
    description: High-recall scoped-paper diverse-window selector using five inspected windows per query.
    retrieval: scoped-paper-diverse-window-k5
    planner: scientific-qa-diverse-windows
    verifier: enabled
    status: runnable-paper-qa
    benchmarkIds: product-rescue-paper-qa,qasper-dev-200
  - id: service-backed-scoped-diverse-window-k7
    name: Service Backed Scoped Diverse Window K7
    description: Deep-recall scoped-paper diverse-window selector using seven inspected windows per query.
    retrieval: scoped-paper-diverse-window-k7
    planner: scientific-qa-diverse-windows
    verifier: enabled
    status: runnable-paper-qa
    benchmarkIds: product-rescue-paper-qa,qasper-dev-200
  - id: product-pdf-parser-smoke
    name: Product PDF Parser Smoke
    description: Test-scoped database gate for real PDF-derived parser outputs, chunks, parser artifacts, and visual assets.
    retrieval: parser-output-check
    planner: none
    verifier: parser-smoke
    status: runnable-parser-smoke
    benchmarkIds: product-pdf-parser-smoke
  - id: product-reading-launch-trace-eval
    name: Product Reading Launch Trace Eval
    description: Trace-artifact gate that verifies Product Reading 9-tool coverage, paper-choice cards, and Source Quote references.
    retrieval: trace-artifact-check
    planner: none
    verifier: trace-eval
    status: runnable-trace-eval
    benchmarkIds: product-reading-launch-trace
  - id: product-reading-live-launch-smoke
    name: Product Reading Live Launch Smoke
    description: Live WebSocket smoke that drives Product Reading chat, chains clicked paper/source quote anchors, and records front-protocol evidence.
    retrieval: websocket-product-reading-chat
    planner: live-llm
    verifier: front-protocol-smoke
    status: runnable-live-smoke
    benchmarkIds: product-reading-live-launch-smoke
  - id: product-pdf-launch-data-seed
    name: Product PDF Launch Data Seed
    description: Live HTTP seed that uploads and merges the 30 launch PDFs through the product API, then waits for frontend-searchable status.
    retrieval: product-upload-http
    planner: none
    verifier: front-searchable-status
    status: runnable-live-seed
    benchmarkIds: product-pdf-launch-data-seed
  - id: product-launch-runtime-preflight
    name: Product Launch Runtime Preflight
    description: Runtime dependency preflight for backend login, infrastructure ports, MinerU, model keys, embedding keys, trace config, and Product Reading enablement.
    retrieval: runtime-preflight
    planner: none
    verifier: dependency-check
    status: runnable-runtime-preflight
    benchmarkIds: product-launch-runtime-preflight
  - id: product-launch-readiness
    name: Product Launch Readiness
    description: Ordered launch wrapper that runs the five product launch gates, stops on first failure, and writes one top-level readiness scorecard.
    retrieval: ordered-launch-gates
    planner: none
    verifier: launch-readiness
    status: runnable-launch-readiness
    benchmarkIds: product-launch-readiness
  - id: semantic-only-baseline
    name: Semantic Only Baseline
    description: Semantic retrieval only with the same answer and evidence verifier.
    retrieval: semantic-only
    planner: deterministic-first
    verifier: enabled
    status: planned
    benchmarkIds: product-rescue-smoke,qasper-dev-200

benchmarks:
  - id: product-rescue-smoke
    name: Product Rescue Smoke
    tier: product
    task: source-grounded paper chat regression
    status: runnable
    path: eval/rag/product-rescue-smoke.jsonl
    source: local
    primaryMetric: passRate
    gateMode: product-smoke
    cases: "6"
  - id: product-rescue-paper-qa
    name: Product Paper-QA Slice
    tier: product
    task: source-grounded scoped paper QA
    status: runnable
    path: eval/rag/product-rescue-paper-qa.jsonl
    source: local
    primaryMetric: passRate
    cases: "10"
  - id: product-pdf-parser-smoke
    name: Product PDF Parser Smoke
    tier: product
    task: real PDF parser and evidence-asset smoke
    status: runnable
    path: eval/rag/pdf-parser/product-pdf-smoke-manifest.jsonl
    source: local committed PDF manifest
    primaryMetric: passRate
    gateMode: pdf-parser-smoke
    cases: "1"
  - id: product-pdf-launch-30
    name: Product PDF Launch 30
    tier: product
    task: 30-real-PDF parser launch gate
    status: runnable
    path: eval/rag/pdf-parser/product-pdf-launch-30-manifest.jsonl
    source: local committed real-PDF manifest
    primaryMetric: passRate
    gateMode: pdf-parser-launch-30
    cases: "30"
  - id: product-pdf-launch-data-seed
    name: Product PDF Launch Data Seed
    tier: product
    task: 30-PDF upload/merge/searchable live data seed
    status: runnable
    path: eval/rag/pdf-parser/product-pdf-launch-30-manifest.jsonl
    source: running PaperLoom backend
    primaryMetric: passRate
    gateMode: product-pdf-launch-data-seed
    cases: "30"
  - id: product-launch-runtime-preflight
    name: Product Launch Runtime Preflight
    tier: product
    task: launch runtime dependency preflight
    status: runnable
    path: .env
    source: local runtime configuration and endpoints
    primaryMetric: passRate
    gateMode: product-launch-runtime-preflight
    cases: "11"
  - id: product-reading-launch-trace
    name: Product Reading Launch Trace
    tier: product
    task: Product Reading 9-tool trace coverage
    status: runnable
    path: eval/rag/product-reading-launch-trace-cases.jsonl
    source: local Product Reading trace artifacts
    primaryMetric: passRate
    gateMode: product-reading-trace-eval
    cases: "9"
  - id: product-reading-live-launch-smoke
    name: Product Reading Live Launch Smoke
    tier: product
    task: Live WebSocket Product Reading launch smoke
    status: runnable
    path: eval/rag/product-reading-live-launch-smoke-cases.jsonl
    source: running Product Reading backend
    primaryMetric: passRate
    gateMode: product-reading-live-launch-smoke
    cases: "9"
  - id: product-launch-readiness
    name: Product Launch Readiness
    tier: product
    task: ordered launch gate readiness
    status: runnable
    path: eval/rag/runs
    source: local launch gate scorecards
    primaryMetric: passRate
    gateMode: product-launch-readiness
    cases: "5 gates"
  - id: product-figure-table-smoke
    name: Product Figure/Table Smoke
    tier: product
    task: table and figure evidence claim gate
    status: runnable-table-only
    path: eval/rag/figure-table/product-figure-table-smoke.jsonl
    source: local committed product paper
    primaryMetric: passRate
    cases: "2 table cases / figure fixture pending"
  - id: qasper-dev-200
    name: QASPER Dev 200
    tier: professional
    task: research-paper evidence QA
    status: runnable
    path: eval/rag/qasper/generated/qasper-dev-200.jsonl
    source: https://allenai.org/data/qasper
    primaryMetric: passRate
    gateMode: qasper-dev-200
    cases: "200"
  - id: litsearch-full
    name: LitSearch Full
    tier: professional
    task: literature search retrieval
    status: runnable
    path: eval/rag/litsearch/generated/litsearch-full-query.jsonl
    source: https://huggingface.co/datasets/princeton-nlp/LitSearch
    primaryMetric: recallAt20
    gateMode: litsearch-full-summary
    cases: "597 queries / 64,183 papers"
  - id: litsearch-service-slice-k5
    name: LitSearch Service Slice K5
    tier: professional
    task: service-backed literature search retrieval over imported candidate papers
    status: runnable
    path: eval/rag/litsearch/generated/litsearch-full-query.jsonl
    source: https://huggingface.co/datasets/princeton-nlp/LitSearch
    primaryMetric: recallAt20
    cases: "597 queries / 5,060 imported candidate papers"
