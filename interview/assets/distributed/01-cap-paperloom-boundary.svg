<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <defs><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 20px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 16px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}</style></defs>
  <rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">CAP 不是三选二：先承认网络分区，再看业务取舍</text><text x="55" y="92" class="s">PaperLoom 把强事实、可重建投影和短期状态分开，减少跨存储强一致范围</text>
  <circle cx="350" cy="455" r="135" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><circle cx="610" cy="455" r="135" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><circle cx="480" cy="250" r="135" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="350" y="450" text-anchor="middle" class="t">一致性 C</text><text x="350" y="480" text-anchor="middle" class="s">多个副本读到同一事实</text><text x="610" y="450" text-anchor="middle" class="t">可用性 A</text><text x="610" y="480" text-anchor="middle" class="s">请求持续得到响应</text><text x="480" y="245" text-anchor="middle" class="t">分区容错 P</text><text x="480" y="275" text-anchor="middle" class="s">网络分区仍能运行</text><text x="480" y="460" text-anchor="middle" class="t">P 下 C/A 取舍</text>
  <rect x="875" y="145" width="525" height="490" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="1137" y="195" text-anchor="middle" class="t">PaperLoom 的事实边界</text><rect x="945" y="235" width="385" height="80" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="1137" y="280" text-anchor="middle" class="t">MySQL：权威事实</text><text x="1137" y="304" text-anchor="middle" class="s">论文、会话、引用、chunk_info</text><rect x="945" y="355" width="385" height="80" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="1137" y="400" text-anchor="middle" class="t">Qdrant：可重建投影</text><text x="1137" y="424" text-anchor="middle" class="s">候选检索，不是最终证据</text><rect x="945" y="475" width="385" height="80" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="1137" y="520" text-anchor="middle" class="t">Redis：短期高速状态</text><text x="1137" y="544" text-anchor="middle" class="s">限流、Bitmap、生成态、TTL</text><text x="750" y="720" text-anchor="middle" class="s">先把每个存储的权威范围说清楚，才谈一致性模型，而不是笼统声称“系统强一致”</text>
</svg>
