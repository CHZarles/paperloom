<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">MySQL 状态与 Kafka 消息：当前双写窗口与 Outbox 改进</text><text x="55" y="92" class="s">Kafka 事务只覆盖 Kafka；不能把数据库 save 和 Kafka send 变成一个原子事务</text>
  <rect x="70" y="145" width="610" height="500" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="375" y="195" text-anchor="middle" class="t">当前代码</text><rect x="145" y="245" width="460" height="80" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="375" y="290" text-anchor="middle" class="t">paperRepository.save(PROCESSING)</text><path d="M375 325 V390" class="a"/><rect x="145" y="390" width="460" height="80" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="375" y="435" text-anchor="middle" class="t">Kafka executeInTransaction(send)</text><rect x="145" y="520" width="460" height="75" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="375" y="565" text-anchor="middle" class="s">中间任一步失败，另一边可能已成功</text>
  <rect x="820" y="145" width="610" height="500" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="1125" y="195" text-anchor="middle" class="t">Outbox 改进方向</text><rect x="895" y="245" width="460" height="80" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="1125" y="290" text-anchor="middle" class="t">同一 MySQL 事务：业务状态 + outbox 事件</text><path d="M1125 325 V390" class="a"/><rect x="895" y="390" width="460" height="80" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="1125" y="435" text-anchor="middle" class="t">发布器读取未发送事件</text><path d="M1125 470 V535" class="a"/><rect x="895" y="535" width="460" height="75" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="1125" y="580" text-anchor="middle" class="t">发送 Kafka，成功后标记已发布</text>
  <text x="750" y="720" text-anchor="middle" class="s">Outbox 仍需幂等发布、重试和事件状态；它解决的是数据库与消息的可靠衔接，不是所有业务事务的万能方案</text>
</svg>
