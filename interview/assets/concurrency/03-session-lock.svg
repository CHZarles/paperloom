<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">WebSocket 发送：锁住连接，不锁住所有用户</text><text x="55" y="92" class="s">ChatSessionRegistry：ConcurrentHashMap → COW List → synchronized(session)</text>
  <rect x="70" y="170" width="280" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="210" y="215" text-anchor="middle" class="t">用户 userId</text><text x="210" y="244" text-anchor="middle" class="s">sessions.get(userId)</text>
  <rect x="460" y="140" width="330" height="170" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="625" y="190" text-anchor="middle" class="t">CopyOnWriteArrayList</text><text x="625" y="225" text-anchor="middle" class="s">session A / B / C</text><text x="625" y="258" text-anchor="middle" class="s">广播遍历读快照</text>
  <path d="M350 225 H460" class="a"/>
  <rect x="915" y="115" width="420" height="390" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="1125" y="165" text-anchor="middle" class="t">每个 Session 独立临界区</text><rect x="980" y="200" width="290" height="75" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="1125" y="245" text-anchor="middle" class="t">synchronized(session A)</text><rect x="980" y="315" width="290" height="75" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="1125" y="360" text-anchor="middle" class="t">synchronized(session B/C)</text><path d="M790 205 H915" class="a"/>
  <rect x="70" y="465" width="280" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="210" y="510" text-anchor="middle" class="t">另一个用户</text><text x="210" y="539" text-anchor="middle" class="s">不会等待 userId A</text>
  <rect x="460" y="435" width="330" height="170" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="625" y="485" text-anchor="middle" class="t">Session B / C</text><text x="625" y="520" text-anchor="middle" class="s">可并行发送</text><text x="625" y="553" text-anchor="middle" class="s">各自检查 isOpen()</text>
  <path d="M350 520 H460" class="a"/><path d="M790 520 C880 520 880 350 915 350" class="a"/>
  <text x="750" y="715" text-anchor="middle" class="s">锁的粒度与共享资源一致；它不提供多节点 WebSocket 顺序，也不保护数据库事务</text>
</svg>
