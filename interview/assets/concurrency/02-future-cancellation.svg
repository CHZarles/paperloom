<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">研究请求：Future、取消与中断传播</text><text x="55" y="92" class="s">cancel(true) 是协作式中断，不是强杀远程任务</text>
  <rect x="60" y="160" width="270" height="100" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="195" y="205" text-anchor="middle" class="t">generationId</text><text x="195" y="232" text-anchor="middle" class="s">提交请求</text>
  <rect x="410" y="160" width="300" height="100" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="560" y="205" text-anchor="middle" class="t">putIfAbsent</text><text x="560" y="232" text-anchor="middle" class="s">拒绝重复归属</text>
  <rect x="790" y="160" width="300" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="940" y="205" text-anchor="middle" class="t">FutureTask</text><text x="940" y="232" text-anchor="middle" class="s">线程池执行 HTTP 流</text>
  <rect x="1170" y="160" width="270" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="1305" y="205" text-anchor="middle" class="t">CompletableFuture</text><text x="1305" y="232" text-anchor="middle" class="s">完成/异常通知</text>
  <path d="M330 210 H410" class="a"/><path d="M710 210 H790" class="a"/><path d="M1090 210 H1170" class="a"/>
  <path d="M940 260 V385" class="a"/><rect x="790" y="385" width="300" height="100" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="940" y="430" text-anchor="middle" class="t">读取 NDJSON</text><text x="940" y="457" text-anchor="middle" class="s">循环检查 isInterrupted()</text>
  <path d="M940 485 V610" class="a"/><rect x="790" y="610" width="300" height="100" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="940" y="655" text-anchor="middle" class="t">成功 settle / complete</text><text x="940" y="682" text-anchor="middle" class="s">whenComplete 清理 Map</text>
  <path d="M1170 210 C1320 300 1320 530 1090 650" class="a"/><rect x="1160" y="385" width="280" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="1300" y="430" text-anchor="middle" class="t">cancel(true)</text><text x="1300" y="457" text-anchor="middle" class="s">future 异常完成 + task 中断</text>
  <text x="750" y="760" text-anchor="middle" class="s">远程服务是否停止，还取决于 HTTP 客户端、阻塞点和任务代码是否响应中断</text>
</svg>
