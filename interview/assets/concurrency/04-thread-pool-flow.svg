<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">ThreadPoolTaskExecutor：提交任务的四步决策</text><text x="55" y="92" class="s">PaperLoom chat monitor：core=4，max=16，queue=200</text>
  <rect x="585" y="135" width="330" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="750" y="184" text-anchor="middle" class="t">提交任务</text><path d="M750 215 V275" class="a"/>
  <rect x="540" y="275" width="420" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="750" y="313" text-anchor="middle" class="t">线程数 &lt; corePoolSize？</text><text x="750" y="342" text-anchor="middle" class="s">是：创建核心线程执行</text>
  <path d="M540 320 H330 V410" class="a"/><rect x="100" y="410" width="460" height="90" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="330" y="448" text-anchor="middle" class="t">否：workQueue 未满？</text><text x="330" y="477" text-anchor="middle" class="s">是：进入有界队列等待</text>
  <path d="M960 320 H1170 V410" class="a"/><rect x="940" y="410" width="460" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="1170" y="448" text-anchor="middle" class="t">队列已满且线程数 &lt; max？</text><text x="1170" y="477" text-anchor="middle" class="s">是：创建非核心线程执行</text>
  <path d="M330 500 V610 H520" class="a"/><path d="M1170 500 V610 H980" class="a"/><rect x="520" y="570" width="460" height="100" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="750" y="615" text-anchor="middle" class="t">否则：执行拒绝策略</text><text x="750" y="644" text-anchor="middle" class="s">Abort / CallerRuns / Discard / DiscardOldest</text>
  <text x="750" y="735" text-anchor="middle" class="s">队列、线程和下游容量共同决定吞吐；无界队列不是无限容量的解决方案</text>
</svg>
