<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 18px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1500" height="820" fill="#f8fafc"/>
  <text x="55" y="58" class="title">流式生成态的 Key 结构与发布顺序</text>
  <text x="55" y="92" class="s">先写可读子项，最后发布 active 指针；所有生成态统一 30 分钟 TTL</text>

  <rect x="70" y="155" width="1360" height="160" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="105" y="198" class="t">创建 Generation</text>
  <rect x="130" y="225" width="200" height="58" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="230" y="261" text-anchor="middle" class="s">1. 清旧子 Key</text>
  <rect x="385" y="225" width="200" height="58" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="485" y="261" text-anchor="middle" class="s">2. content = ""</text>
  <rect x="640" y="225" width="200" height="58" rx="6" fill="#fef3c7" stroke="#d97706"/><text x="740" y="261" text-anchor="middle" class="s">3. 写 meta</text>
  <rect x="895" y="225" width="200" height="58" rx="6" fill="#fae8ff" stroke="#a21caf"/><text x="995" y="261" text-anchor="middle" class="s">4. 发布 active:user</text>
  <rect x="1150" y="225" width="200" height="58" rx="6" fill="#fee2e2" stroke="#dc2626"/><text x="1250" y="261" text-anchor="middle" class="s">5. active:user:client</text>
  <path d="M330 254 H385" class="a"/><path d="M585 254 H640" class="a"/><path d="M840 254 H895" class="a"/><path d="M1095 254 H1150" class="a"/>

  <rect x="80" y="390" width="300" height="160" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="435" text-anchor="middle" class="t">String</text>
  <text x="230" y="472" text-anchor="middle" class="s">meta / content</text><text x="230" y="504" text-anchor="middle" class="s">references / diagnostics</text><text x="230" y="532" text-anchor="middle" class="s">reading artifacts</text>
  <rect x="455" y="390" width="300" height="160" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="605" y="435" text-anchor="middle" class="t">List</text>
  <text x="605" y="472" text-anchor="middle" class="s">progress events</text><text x="605" y="504" text-anchor="middle" class="s">RPUSH 追加</text><text x="605" y="532" text-anchor="middle" class="s">读取完整进度历史</text>
  <rect x="830" y="390" width="300" height="160" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="980" y="435" text-anchor="middle" class="t">Active Pointer</text>
  <text x="980" y="472" text-anchor="middle" class="s">user -> generationId</text><text x="980" y="504" text-anchor="middle" class="s">user + client -> generationId</text><text x="980" y="532" text-anchor="middle" class="s">终态时按值清理</text>
  <rect x="1205" y="390" width="190" height="160" rx="8" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="1300" y="435" text-anchor="middle" class="t">TTL</text>
  <text x="1300" y="482" text-anchor="middle" class="s">30 分钟</text><text x="1300" y="518" text-anchor="middle" class="s">每次更新续期</text>

  <rect x="210" y="655" width="1080" height="72" rx="6" fill="#ffffff" stroke="#64748b"/>
  <text x="750" y="686" text-anchor="middle" class="s">为什么最后写 active：避免读取者先拿到 generationId，却查不到 meta/content。</text>
  <text x="750" y="711" text-anchor="middle" class="s">这改善发布顺序，但多 Key 仍不是一个 Redis 事务快照。</text>
</svg>
