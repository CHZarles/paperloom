<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 16px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <text x="60" y="58" class="title">循环依赖与三级缓存</text>
  <text x="60" y="92" class="s">Q17-Q19：先看 A ↔ B，再看早期引用放在哪里</text>

  <rect x="110" y="160" width="220" height="110" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="220" y="205" text-anchor="middle" class="t">Bean A</text><text x="220" y="238" text-anchor="middle" class="s">属性需要 Bean B</text>
  <rect x="470" y="160" width="220" height="110" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="580" y="205" text-anchor="middle" class="t">Bean B</text><text x="580" y="238" text-anchor="middle" class="s">属性需要 Bean A</text>
  <path d="M330 195 H470" class="a"/><path d="M470 245 H360 Q330 245 330 275 V300 Q330 320 350 320 H560 Q580 320 580 290 V270" class="a"/>

  <rect x="810" y="135" width="480" height="430" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="850" y="180" class="t">DefaultSingletonBeanRegistry 三级缓存</text>
  <rect x="860" y="220" width="380" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="1050" y="252" text-anchor="middle" class="t">一级：singletonObjects</text><text x="1050" y="279" text-anchor="middle" class="s">完整初始化后的 Bean</text>
  <rect x="860" y="330" width="380" height="78" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1050" y="362" text-anchor="middle" class="t">二级：earlySingletonObjects</text><text x="1050" y="389" text-anchor="middle" class="s">已经生成的早期引用</text>
  <rect x="860" y="440" width="380" height="88" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="1050" y="472" text-anchor="middle" class="t">三级：singletonFactories</text><text x="1050" y="500" text-anchor="middle" class="s">ObjectFactory，可生成早期代理引用</text>
  <path d="M1050 440 V410" class="a"/><path d="M1050 330 V300" class="a"/>

  <rect x="110" y="410" width="590" height="160" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="140" y="452" class="t">不能靠三级缓存解决</text>
  <text x="140" y="488" class="s">1. 构造器 A(B) 与 B(A) 循环依赖</text>
  <text x="140" y="520" class="s">2. prototype Bean 循环依赖</text>
  <text x="140" y="552" class="s">3. 新版 Boot 默认不鼓励循环依赖，设计上应优先拆分</text>
  <text x="700" y="655" text-anchor="middle" class="s">PaperLoom 不把循环依赖当项目亮点；这是一道 Spring 原理题。</text>
</svg>
