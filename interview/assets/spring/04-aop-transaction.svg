<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 18px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1400" height="720" fill="#f8fafc"/>
  <text x="60" y="58" class="title">AOP 代理与声明式事务</text>
  <text x="60" y="92" class="s">Q20-Q29：调用必须经过代理，事务才会生效</text>

  <rect x="60" y="175" width="180" height="90" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="228" text-anchor="middle" class="t">调用方</text>
  <rect x="300" y="155" width="250" height="130" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="425" y="198" text-anchor="middle" class="t">Spring 代理对象</text>
  <text x="425" y="230" text-anchor="middle" class="s">JDK Proxy / CGLIB</text>
  <text x="425" y="258" text-anchor="middle" class="s">TransactionInterceptor</text>
  <rect x="620" y="175" width="210" height="90" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="725" y="210" text-anchor="middle" class="t">开启事务</text><text x="725" y="240" text-anchor="middle" class="s">绑定连接 / 状态</text>
  <rect x="900" y="175" width="250" height="90" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1025" y="210" text-anchor="middle" class="t">目标 Service 方法</text><text x="1025" y="240" text-anchor="middle" class="s">Repository / SQL</text>
  <path d="M240 220 H300" class="a"/><path d="M550 220 H620" class="a"/><path d="M830 220 H900" class="a"/>

  <path d="M1025 265 V340 H760" class="a"/>
  <rect x="480" y="330" width="280" height="90" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="620" y="365" text-anchor="middle" class="t">正常返回：COMMIT</text><text x="620" y="395" text-anchor="middle" class="s">释放事务资源</text>
  <rect x="860" y="330" width="300" height="90" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1010" y="365" text-anchor="middle" class="t">满足回滚规则：ROLLBACK</text><text x="1010" y="395" text-anchor="middle" class="s">异常继续向上抛</text>
  <path d="M1025 340 H860" class="a"/>

  <rect x="95" y="500" width="1210" height="130" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="130" y="540" class="t">高频失效点</text>
  <text x="130" y="577" class="s">this 自调用绕过代理　|　对象不是 Spring Bean　|　异常被吞　|　checked exception 默认不回滚　|　新线程不继承事务</text>
  <text x="130" y="608" class="s">PaperLoom：会话范围锁定是 MySQL 本地事务；不能把 Redis、Kafka、HTTP 自动算进同一事务。</text>
  <text x="700" y="680" text-anchor="middle" class="s">口诀：调用方 -> 代理 -> 开事务 -> 目标方法 -> 提交或回滚</text>
</svg>
