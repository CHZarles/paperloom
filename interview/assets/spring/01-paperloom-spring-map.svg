<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}
      .sub{font:400 17px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}
      .box-title{font:700 20px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}
      .box-text{font:400 16px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#334155}
      .arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1400" height="760" fill="#f8fafc"/>
  <text x="60" y="58" class="title">PaperLoom 中 Spring 到底管什么</text>
  <text x="60" y="90" class="sub">从网络入口到业务 Bean，再到数据与外部服务</text>

  <rect x="60" y="135" width="210" height="105" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="165" y="175" text-anchor="middle" class="box-title">浏览器 / 前端</text>
  <text x="165" y="207" text-anchor="middle" class="box-text">HTTP + WebSocket</text>

  <rect x="330" y="135" width="230" height="105" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="445" y="175" text-anchor="middle" class="box-title">嵌入式 Tomcat</text>
  <text x="445" y="207" text-anchor="middle" class="box-text">端口、Servlet、连接</text>

  <rect x="620" y="125" width="280" height="125" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="760" y="165" text-anchor="middle" class="box-title">Spring Security Filter Chain</text>
  <text x="760" y="198" text-anchor="middle" class="box-text">JWTAuthenticationFilter</text>
  <text x="760" y="225" text-anchor="middle" class="box-text">OrgTagAuthorizationFilter</text>

  <rect x="960" y="135" width="260" height="105" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1090" y="175" text-anchor="middle" class="box-title">MVC / WebSocket 入口</text>
  <text x="1090" y="207" text-anchor="middle" class="box-text">Controller / Handler</text>

  <path d="M270 187 H330" class="arrow"/>
  <path d="M560 187 H620" class="arrow"/>
  <path d="M900 187 H960" class="arrow"/>

  <rect x="120" y="330" width="1160" height="320" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2.5"/>
  <text x="150" y="370" class="box-title">Spring ApplicationContext：创建、注入并管理下面这些 Bean</text>

  <rect x="170" y="415" width="250" height="120" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="295" y="453" text-anchor="middle" class="box-title">ChatHandler</text>
  <text x="295" y="485" text-anchor="middle" class="box-text">会话、限流、生成态</text>
  <text x="295" y="512" text-anchor="middle" class="box-text">协调主链路</text>

  <rect x="475" y="415" width="280" height="120" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/>
  <text x="615" y="453" text-anchor="middle" class="box-title">业务 Service</text>
  <text x="615" y="485" text-anchor="middle" class="box-text">Scope / Reading / Upload</text>
  <text x="615" y="512" text-anchor="middle" class="box-text">事务代理、生命周期</text>

  <rect x="810" y="415" width="250" height="120" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/>
  <text x="935" y="453" text-anchor="middle" class="box-title">Repository / Client</text>
  <text x="935" y="485" text-anchor="middle" class="box-text">JPA、Redis、Kafka</text>
  <text x="935" y="512" text-anchor="middle" class="box-text">HTTP Client</text>

  <path d="M420 475 H475" class="arrow"/>
  <path d="M755 475 H810" class="arrow"/>

  <rect x="180" y="575" width="190" height="48" rx="6" fill="#ecfccb" stroke="#65a30d"/>
  <text x="275" y="606" text-anchor="middle" class="box-text">MySQL / JPA</text>
  <rect x="410" y="575" width="170" height="48" rx="6" fill="#ffe4e6" stroke="#e11d48"/>
  <text x="495" y="606" text-anchor="middle" class="box-text">Redis</text>
  <rect x="620" y="575" width="170" height="48" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="705" y="606" text-anchor="middle" class="box-text">Kafka</text>
  <rect x="830" y="575" width="180" height="48" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="920" y="606" text-anchor="middle" class="box-text">Python Harness</text>
  <rect x="1050" y="575" width="170" height="48" rx="6" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1135" y="606" text-anchor="middle" class="box-text">Qdrant / MinIO</text>

  <path d="M1090 240 V295 H295 V415" class="arrow"/>
  <path d="M935 535 V555 H275 V575" class="arrow"/>
  <path d="M935 535 V555 H495 V575" class="arrow"/>
  <path d="M935 535 V555 H705 V575" class="arrow"/>
  <path d="M935 535 V575" class="arrow"/>
  <path d="M935 535 V555 H1135 V575" class="arrow"/>

  <text x="700" y="712" text-anchor="middle" class="sub">记忆点：Tomcat 管网络入口，Spring 容器管 Bean；Filter 管请求安全，事务 AOP 管方法边界。</text>
</svg>
