<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.p{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#a)}</style></defs><rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">两个实时协议：连接模型相似，消息边界不同</text><rect x="65" y="145" width="620" height="500" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><text x="375" y="195" text-anchor="middle" class="t">WebSocket</text><rect x="150" y="245" width="450" height="75" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="375" y="290" text-anchor="middle" class="t">HTTP Upgrade → TCP 长连接</text><path d="M375 320 V380" class="p"/><rect x="150" y="380" width="450" height="170" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="375" y="425" text-anchor="middle" class="t">帧 / 消息边界由协议定义</text><text x="375" y="465" text-anchor="middle" class="s">浏览器 ↔ Java 双向发送</text><text x="375" y="505" text-anchor="middle" class="s">ping/pong 保活，断开需重连</text><rect x="815" y="145" width="620" height="500" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/><text x="1125" y="195" text-anchor="middle" class="t">HTTP + NDJSON</text><rect x="900" y="245" width="450" height="75" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="1125" y="290" text-anchor="middle" class="t">POST /v1/research/stream</text><path d="M1125 320 V380" class="p"/><rect x="900" y="380" width="450" height="170" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="1125" y="425" text-anchor="middle" class="t">HTTP Body：一行一个 JSON</text><text x="1125" y="465" text-anchor="middle" class="s">半行要缓冲，换行后再解析</text><text x="1125" y="505" text-anchor="middle" class="s">progress 先转发，result 最后完成</text><text x="750" y="720" text-anchor="middle" class="s">TCP 是字节流；应用层必须自己定义消息边界与取消语义</text></svg>
