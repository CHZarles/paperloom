<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.p{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#a)}</style></defs><rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">PaperLoom 网络主线：REST、WebSocket、NDJSON</text><text x="55" y="92" class="s">三条链路共用认证、连接和超时基础，但消息边界和生命周期不同</text><rect x="65" y="160" width="260" height="470" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="195" y="215" text-anchor="middle" class="t">浏览器</text><text x="195" y="280" text-anchor="middle" class="s">REST + Bearer JWT</text><text x="195" y="335" text-anchor="middle" class="s">WebSocket + ping/pong</text><text x="195" y="390" text-anchor="middle" class="s">上传 / 聊天 / 查询</text><rect x="510" y="160" width="420" height="470" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="720" y="215" text-anchor="middle" class="t">Java PaperLoom</text><rect x="570" y="270" width="300" height="70" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="720" y="312" text-anchor="middle" class="t">Security Filter / Handler</text><rect x="570" y="380" width="300" height="70" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="720" y="422" text-anchor="middle" class="t">Service / Redis / MySQL</text><text x="720" y="535" text-anchor="middle" class="s">ChatSessionRegistry 推送</text><path d="M325 280 H510" class="p"/><path d="M325 360 C410 360 420 535 510 535" class="p"/><rect x="1115" y="160" width="320" height="470" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="1275" y="215" text-anchor="middle" class="t">Python Harness</text><text x="1275" y="280" text-anchor="middle" class="s">HTTP POST</text><text x="1275" y="335" text-anchor="middle" class="s">Accept: application/x-ndjson</text><text x="1275" y="390" text-anchor="middle" class="s">逐行 progress</text><text x="1275" y="445" text-anchor="middle" class="s">最终 result</text><path d="M930 385 H1115" class="p"/><text x="750" y="720" text-anchor="middle" class="s">WebSocket 是双向帧；NDJSON 是 HTTP 响应体里的按行应用协议</text></svg>
