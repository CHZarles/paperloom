<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="800" viewBox="0 0 1500 800"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 19px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 15px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.p{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#a)}</style></defs><rect width="1500" height="800" fill="#f8fafc"/><text x="55" y="58" class="title">TCP 生命周期：三次握手、数据、四次挥手</text><text x="55" y="92" class="s">握手确认能力与序列号；挥手是两个方向独立关闭</text><text x="300" y="155" text-anchor="middle" class="t">客户端</text><text x="1200" y="155" text-anchor="middle" class="t">服务端</text><line x1="300" y1="175" x2="300" y2="650" stroke="#64748b" stroke-width="2"/><line x1="1200" y1="175" x2="1200" y2="650" stroke="#64748b" stroke-width="2"/><path d="M330 220 H1170" class="p"/><text x="750" y="210" text-anchor="middle" class="s">SYN</text><path d="M1170 285 H330" class="p"/><text x="750" y="275" text-anchor="middle" class="s">SYN + ACK</text><path d="M330 350 H1170" class="p"/><text x="750" y="340" text-anchor="middle" class="s">ACK（连接建立）</text><rect x="550" y="390" width="400" height="70" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="750" y="433" text-anchor="middle" class="t">双向字节流传输</text><path d="M330 515 H1170" class="p"/><text x="750" y="505" text-anchor="middle" class="s">客户端 FIN</text><path d="M1170 565 H330" class="p"/><text x="750" y="555" text-anchor="middle" class="s">服务端 ACK（仍可发数据）</text><path d="M1170 615 H330" class="p"/><text x="750" y="605" text-anchor="middle" class="s">服务端 FIN</text><path d="M330 665 H1170" class="p"/><text x="750" y="655" text-anchor="middle" class="s">客户端 ACK → TIME-WAIT 2MSL</text></svg>
