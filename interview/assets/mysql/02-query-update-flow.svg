<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="790" viewBox="0 0 1500 790">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 17px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 14px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.1;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1500" height="790" fill="#f8fafc"/>
  <text x="55" y="58" class="title">一条查询和一条更新如何执行</text>
  <text x="55" y="92" class="s">Q20-Q22：ORM 最终仍然进入 MySQL 的解析、优化、执行与 InnoDB</text>

  <text x="60" y="155" class="t">SELECT 查询路径</text>
  <g>
    <rect x="45" y="185" width="150" height="78" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="120" y="231" text-anchor="middle" class="t">连接器</text>
    <rect x="235" y="185" width="150" height="78" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="310" y="231" text-anchor="middle" class="t">解析器</text>
    <rect x="425" y="185" width="150" height="78" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="500" y="231" text-anchor="middle" class="t">优化器</text>
    <rect x="615" y="185" width="150" height="78" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/><text x="690" y="231" text-anchor="middle" class="t">执行器</text>
    <rect x="805" y="185" width="170" height="78" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="890" y="220" text-anchor="middle" class="t">InnoDB</text><text x="890" y="246" text-anchor="middle" class="s">索引 / 行 / 锁</text>
    <rect x="1015" y="185" width="180" height="78" rx="6" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/><text x="1105" y="220" text-anchor="middle" class="t">Buffer Pool</text><text x="1105" y="246" text-anchor="middle" class="s">数据页 / 索引页</text>
    <rect x="1235" y="185" width="170" height="78" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="1320" y="231" text-anchor="middle" class="t">返回结果</text>
    <path d="M195 224 H235" class="a"/><path d="M385 224 H425" class="a"/><path d="M575 224 H615" class="a"/><path d="M765 224 H805" class="a"/><path d="M975 224 H1015" class="a"/><path d="M1195 224 H1235" class="a"/>
  </g>

  <text x="60" y="365" class="t">UPDATE / INSERT 路径增加日志和事务步骤</text>
  <rect x="70" y="405" width="210" height="90" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="175" y="440" text-anchor="middle" class="t">定位并加锁</text><text x="175" y="468" text-anchor="middle" class="s">索引找到目标记录</text>
  <rect x="340" y="405" width="210" height="90" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="445" y="440" text-anchor="middle" class="t">写 Undo</text><text x="445" y="468" text-anchor="middle" class="s">旧版本 / 回滚 / MVCC</text>
  <rect x="610" y="405" width="210" height="90" rx="6" fill="#ecfccb" stroke="#65a30d" stroke-width="2"/><text x="715" y="440" text-anchor="middle" class="t">修改 Buffer Pool</text><text x="715" y="468" text-anchor="middle" class="s">形成脏页</text>
  <rect x="880" y="405" width="210" height="90" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="985" y="440" text-anchor="middle" class="t">写 Redo</text><text x="985" y="468" text-anchor="middle" class="s">WAL / 崩溃恢复</text>
  <rect x="1150" y="405" width="210" height="90" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/><text x="1255" y="440" text-anchor="middle" class="t">写 Binlog</text><text x="1255" y="468" text-anchor="middle" class="s">复制 / 归档恢复</text>
  <path d="M280 450 H340" class="a"/><path d="M550 450 H610" class="a"/><path d="M820 450 H880" class="a"/><path d="M1090 450 H1150" class="a"/>

  <rect x="180" y="585" width="1140" height="110" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="215" y="625" class="t">JPA 不是“没有 SQL”</text>
  <text x="215" y="660" class="s">Repository/JPQL/EntityGraph 最终生成 SQL；索引选择、扫描行数、回表、锁等待仍由 MySQL 决定。</text>
  <text x="750" y="750" text-anchor="middle" class="s">查询口诀：连接 -> 解析 -> 优化 -> 执行 -> 引擎；更新再加 Undo、Redo、Binlog 和锁。</text>
</svg>
