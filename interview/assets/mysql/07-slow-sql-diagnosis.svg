<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="720" viewBox="0 0 1450 720">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker><style>.title{font:700 32px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.t{font:700 17px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#111827}.s{font:400 14px 'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#475569}.a{stroke:#334155;stroke-width:2.1;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect width="1450" height="720" fill="#f8fafc"/>
  <text x="55" y="58" class="title">慢 SQL 排查闭环</text>
  <text x="55" y="92" class="s">Q32-Q34、Q52、Q78：不要一上来只回答“加索引”</text>

  <rect x="60" y="175" width="180" height="90" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="150" y="210" text-anchor="middle" class="t">1. 捕获证据</text><text x="150" y="238" text-anchor="middle" class="s">慢日志 / APM / 参数</text>
  <rect x="285" y="175" width="180" height="90" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="375" y="210" text-anchor="middle" class="t">2. 稳定复现</text><text x="375" y="238" text-anchor="middle" class="s">数据量 / 并发 / 缓存</text>
  <rect x="510" y="175" width="180" height="90" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="600" y="210" text-anchor="middle" class="t">3. EXPLAIN</text><text x="600" y="238" text-anchor="middle" class="s">type / key / rows / Extra</text>
  <rect x="735" y="175" width="190" height="90" rx="6" fill="#fae8ff" stroke="#a21caf" stroke-width="2"/><text x="830" y="210" text-anchor="middle" class="t">4. 分类瓶颈</text><text x="830" y="238" text-anchor="middle" class="s">扫描 / 回表 / 排序 / 锁</text>
  <rect x="970" y="175" width="190" height="90" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="1065" y="210" text-anchor="middle" class="t">5. 修改</text><text x="1065" y="238" text-anchor="middle" class="s">SQL / 索引 / 数据模型</text>
  <rect x="1205" y="175" width="180" height="90" rx="6" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><text x="1295" y="210" text-anchor="middle" class="t">6. 再验证</text><text x="1295" y="238" text-anchor="middle" class="s">延迟 / 吞吐 / 写成本</text>
  <path d="M240 220 H285" class="a"/><path d="M465 220 H510" class="a"/><path d="M690 220 H735" class="a"/><path d="M925 220 H970" class="a"/><path d="M1160 220 H1205" class="a"/>

  <rect x="100" y="365" width="1250" height="210" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="140" y="410" class="t">常见信号 -> 可能问题</text>
  <text x="140" y="452" class="s">ALL / rows 很大　　　　　　全表或大范围扫描，检查谓词和索引</text>
  <text x="140" y="488" class="s">Using filesort / temporary　　排序、分组无法利用合适索引</text>
  <text x="760" y="452" class="s">回表次数多　　　　　　　　考虑覆盖索引，但评估写放大</text>
  <text x="760" y="488" class="s">Lock wait / Deadlock　　　　事务太长、访问顺序、索引不准</text>
  <text x="140" y="530" class="s">CPU 飙升还要同时检查连接数、热点 SQL、执行计划变化、磁盘 IO 和下游重试风暴。</text>

  <text x="725" y="655" text-anchor="middle" class="s">闭环：证据 -> 假设 -> 修改 -> 对照验证；索引不是唯一答案，也不是越多越好。</text>
</svg>
