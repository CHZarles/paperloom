topic: "PaperLoom Reading Retrieval Pipeline 技术选型"
created_at: "2026-07-03"

field_groups:
  - group: "定位"
    fields:
      - name: "recommendation_level"
        description: "主链路 / 可选增强 / 不建议。"
        detail_level: "极简"
      - name: "problem_solved"
        description: "该技术解决 pipeline 中哪个具体问题。"
        detail_level: "简要"
      - name: "pipeline_stage"
        description: "属于 ingestion、reading model、chunking、indexing、summary、agent tool、memory、router、final citation 哪一层。"
        detail_level: "简要"

  - group: "输入输出"
    fields:
      - name: "input_contract"
        description: "需要的输入数据：MinerU JSON、markdown、page text、table HTML、figure caption、source spans、query、memory 等。"
        detail_level: "详细"
      - name: "output_contract"
        description: "产出对象：chunk、index document、summary、location candidate、source quote、rerank score、memory record 等。"
        detail_level: "详细"
      - name: "paper_dom_schema"
        description: "是否需要或修改 PaperLoom Reading Model 的对象树和稳定 ID。"
        detail_level: "详细"

  - group: "Reading Model"
    fields:
      - name: "source_span_granularity"
        description: "引用能精确到 page、block、sentence、table cell、bbox 还是只能到 chunk。"
        detail_level: "详细"
      - name: "table_formula_handling"
        description: "是否保留 HTML、LaTeX、caption、footnote、row/column header、cell bbox。"
        detail_level: "详细"
      - name: "visual_grounding_support"
        description: "是否支持 page image、region crop、bbox highlight、visual retrieval。"
        detail_level: "简要"
      - name: "parse_quality_metrics"
        description: "是否记录 OCR confidence、reading order score、table validity、formula parse status。"
        detail_level: "详细"

  - group: "Chunking"
    fields:
      - name: "chunk_boundary_policy"
        description: "按 page、section、paragraph、token、table、figure、formula、reference 的切分规则。"
        detail_level: "详细"
      - name: "read_window_policy"
        description: "search 命中后 read 多大范围：相邻 chunk、整段、整页、整节、表格上下文。"
        detail_level: "详细"
      - name: "original_vs_enriched_text_policy"
        description: "区分原文、清洗文本、上下文增强文本、summary，防止把生成内容当证据。"
        detail_level: "详细"

  - group: "Indexing"
    fields:
      - name: "index_modalities"
        description: "支持 BM25、dense、learned sparse、multi-vector、visual、graph、summary index 中哪些。"
        detail_level: "详细"
      - name: "fusion_policy"
        description: "RRF、weighted fusion、filter-first、rerank-after-fusion、MMR/diversity 等策略。"
        detail_level: "详细"
      - name: "reranker_type"
        description: "cross-encoder、LLM reranker、ColBERT late interaction、answerability reranker 等。"
        detail_level: "简要"
      - name: "metadata_filter_contract"
        description: "paperId、org tag、user role、page range、section、content type、parser/index version 如何进入 retrieval。"
        detail_level: "详细"

  - group: "Summary"
    fields:
      - name: "summary_role"
        description: "summary 用于导航、压缩、rerank，还是可能被误当 final evidence。PaperLoom 默认不能当证据。"
        detail_level: "详细"
      - name: "summary_scope"
        description: "paper、section、table、figure caption、query-specific summary、memory summary。"
        detail_level: "简要"
      - name: "summary_refresh_policy"
        description: "parser/chunker/model/prompt 变化后如何重建 summary。"
        detail_level: "简要"

  - group: "Agentic Search"
    fields:
      - name: "agent_tool_schema_quality"
        description: "工具参数、返回字段、错误码、token budget、排序解释、trace ID 是否清晰。"
        detail_level: "详细"
      - name: "query_planning_support"
        description: "是否支持 query rewrite、sub-question decomposition、iterative search、evidence gap detection。"
        detail_level: "详细"
      - name: "fallback_behavior"
        description: "无证据、证据冲突、PDF 解析失败、工具失败时如何回答。"
        detail_level: "详细"
      - name: "retrieval_diagnostics"
        description: "是否记录 query rewrite、候选集、scores、fusion rank、rerank reason、read trace、final cited refs。"
        detail_level: "详细"

  - group: "Memory"
    fields:
      - name: "memory_lifecycle"
        description: "区分 Redis 短期状态、MySQL 持久历史、conversation summary、sourceQuoteRef 复用、TTL。"
        detail_level: "详细"
      - name: "memory_write_policy"
        description: "何时写入已读 sourceQuoteRef、未解决问题、用户偏好、任务进度。"
        detail_level: "简要"
      - name: "memory_as_evidence_policy"
        description: "明确 memory 不能支持最终论文内容 claim，只能帮助找回 Source Quote。"
        detail_level: "详细"

  - group: "Fast Model Router"
    fields:
      - name: "router_escalation_policy"
        description: "FAST 何时升级 STRONG：低置信、引用校验失败、跨 section 推理、证据冲突、parse 质量低。"
        detail_level: "详细"
      - name: "model_role_mapping"
        description: "FAST / STRONG / EMBEDDING / RERANKER / VISION 各自负责什么。"
        detail_level: "简要"
      - name: "provider_fit"
        description: "Groq、Cerebras、OpenAI、DashScope、Cohere、Jina、local model 等适合哪些任务。"
        detail_level: "简要"

  - group: "Citation And Verification"
    fields:
      - name: "citation_verification_method"
        description: "claim decomposition、quote matching、NLI/LLM support check、faithfulness check 等。"
        detail_level: "详细"
      - name: "final_answer_contract"
        description: "最终回答如何绑定 sourceQuoteRef，什么时候返回证据不足。"
        detail_level: "详细"
      - name: "visual_source_attribution"
        description: "是否能从 sourceQuoteRef 回到 PDF 页码、bbox、高亮区域、截图。"
        detail_level: "简要"

  - group: "工程集成"
    fields:
      - name: "deployment_surface"
        description: "Spring Boot、Elasticsearch、MySQL、Redis、Kafka、MinIO 的集成点；是否需要 Python sidecar/GPU/license feature。"
        detail_level: "详细"
      - name: "index_versioning_model"
        description: "parser、chunker、embedder、reranker、summary prompt 版本、rebuild status、rollback 策略。"
        detail_level: "详细"
      - name: "cost_latency_budget"
        description: "按 ingest、index、search、rerank、summary、memory、final synthesis 分段记录成本和 p50/p95。"
        detail_level: "详细"
      - name: "prompt_context_cache_policy"
        description: "缓存 key 是否包含 paper/index/model/prompt version，是否会造成 stale evidence。"
        detail_level: "简要"

  - group: "评估与安全"
    fields:
      - name: "evaluation_dataset_boundary"
        description: "product data 与 eval data 是否隔离，是否避免 includeEval 进入产品路径。"
        detail_level: "详细"
      - name: "retrieval_metrics"
        description: "recall@k、nDCG、MRR、answerability、citation faithfulness、latency、cost。"
        detail_level: "详细"
      - name: "security_prompt_injection_risk"
        description: "PDF 原文可能包含恶意指令，source text 必须与 system/tool 指令隔离。"
        detail_level: "详细"

uncertain:
  - "MinerU 当前输出是否稳定提供 block-level char offset。"
  - "当前 Elasticsearch 版本和 license 是否支持所需 dense/sparse/rerank 功能。"
  - "是否优先接入外部 reranker，还是先用现有 embedding + BM25 + RRF。"
  - "Fast provider 是否优先评估 Groq、Cerebras，还是现有模型 provider router 先抽象。"
  - "视觉检索是否进入近期路线，还是只保留 bbox/page screenshot attribution。"
  - "Source Quote 是否第一版精确到 page+chunk，还是必须精确到 block/char span。"
