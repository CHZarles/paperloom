# 以下为前端编译发布后nginx配置的相关代码片段
server {
  listen 8080;

  etag on;
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    application/javascript
    application/json
    application/wasm
    image/svg+xml
    text/css
    text/javascript;

  # Enable Brotli for the same types at the CDN or Nginx edge when the
  # ngx_brotli module is installed. Keep gzip as the universal fallback.

  location ^~ /assets/ {
    root html;
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # Public assets without content hashes should revalidate on a shorter cycle.
  location ~* \.(?:css|js|mjs|json|svg|wasm|woff2?)$ {
    root html;
    try_files $uri =404;
    expires 1h;
    add_header Cache-Control "public, max-age=3600" always;
  }

  location = /index.html {
    root html;
    add_header Cache-Control "no-cache" always;
  }

  location / {
    # root D:/PaperLoom/frontend/dist;
    root html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8081;
  }

  location /proxy-ws {
    rewrite ^/proxy-ws(/.*)$ $1 break;

    proxy_pass http://127.0.0.1:8081;

    # 必须设置以下头部以支持 WebSocket
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
