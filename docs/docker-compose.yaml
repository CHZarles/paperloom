name: paperloom

services:
  mysql:
    container_name: ${PAPERLOOM_MYSQL_CONTAINER:-paperloom-mysql}
    image: mysql:8
    restart: always
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD in .env}
      MYSQL_DATABASE: ${PAPERLOOM_DB_SCHEMA:-paperloom}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --explicit_defaults_for_timestamp=true --lower_case_table_names=1
    healthcheck:
      start_period: 5s
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  minio:
    container_name: ${PAPERLOOM_MINIO_CONTAINER:-paperloom-minio}
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: always
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}
    command: server /data --console-address ":9001" -address ":9000"

  redis:
    image: redis
    container_name: ${PAPERLOOM_REDIS_CONTAINER:-paperloom-redis}
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:?Set SPRING_DATA_REDIS_PASSWORD in .env}
    healthcheck:
      start_period: 5s
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: ["redis-server", "--bind", "0.0.0.0", "--port", "6379", "--requirepass", "${SPRING_DATA_REDIS_PASSWORD:?Set SPRING_DATA_REDIS_PASSWORD in .env}", "--appendonly", "yes"]

  kafka:
      image: bitnamilegacy/kafka:latest
      container_name: ${PAPERLOOM_KAFKA_CONTAINER:-paperloom-kafka}
      restart: always
      ports:
        - "9092:9092"
        - "9093:9093"
      environment:
        - KAFKA_CFG_NODE_ID=0
        - KAFKA_CFG_PROCESS_ROLES=controller,broker
        - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
        - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093

        # 监听器配置
        - KAFKA_CFG_LISTENERS=CONTROLLER://:9093,PLAINTEXT://:9092
        - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
        - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      volumes:
        - kafka-data:/bitnami/kafka
      command:
        - sh
        - -c
        - |
          # 启动 Kafka（使用 bitnami 完整初始化流程）
          /opt/bitnami/scripts/kafka/run.sh &

          # 等待 Kafka 完全启动（更可靠的检测方式）
          echo "Waiting for Kafka to start..."
          while ! kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null; do
            sleep 2
          done

          # 创建第一个主题（忽略已存在的错误）
          echo "Creating topic: file-processing"
          kafka-topics.sh --create \
            --bootstrap-server localhost:9092 \
            --replication-factor 1 \
            --partitions 1 \
            --topic file-processing 2>/dev/null || true

          # 创建第二个主题 vectorization
          echo "Creating topic: vectorization"
          kafka-topics.sh --create \
            --bootstrap-server localhost:9092 \
            --replication-factor 1 \
            --partitions 1 \
            --topic vectorization 2>/dev/null || true
          # 保持容器运行
          tail -f /dev/null
      healthcheck:
        test:
          [
            "CMD-SHELL",
            "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
          ]
        interval: 30s
        timeout: 10s
        retries: 5
        start_period: 60s

  
  es:
    image: elasticsearch:8.10.4
    container_name: ${PAPERLOOM_ES_CONTAINER:-paperloom-es}
    restart: always
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:?Set ELASTICSEARCH_PASSWORD in .env}
      - node.name=paperloom-es01
      - discovery.type=single-node
      - xpack.license.self_generated.type=basic
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.name=paperloom-es-cluster

      # 内存配置 (根据可用RAM调整)
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    deploy:
      resources:
        limits:
          memory: 2g
    command: >
      bash -c "
      if ! elasticsearch-plugin list | grep -q 'analysis-ik'; then
        echo 'Installing analysis-ik plugin...';
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.10.4.zip;
      else
        echo 'analysis-ik plugin already installed.';
      fi;
      /usr/local/bin/docker-entrypoint.sh
      "
    healthcheck:
      test: [ 'CMD', 'curl', '-s', 'http://localhost:9200/_cluster/health?pretty' ]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY in .env}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-uploads}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing local/"$${MINIO_BUCKET_NAME}"
        exit 0

volumes:
  redis-data:
    name: ${PAPERLOOM_REDIS_VOLUME:-paperloom-redis-data}
  mysql-data:
    name: ${PAPERLOOM_MYSQL_VOLUME:-paperloom-mysql-data}
  minio-data:
    name: ${PAPERLOOM_MINIO_VOLUME:-paperloom-minio-data}
  kafka-data:
    name: ${PAPERLOOM_KAFKA_VOLUME:-paperloom-kafka-data}
  es-data:
    name: ${PAPERLOOM_ES_VOLUME:-paperloom-es-data}
