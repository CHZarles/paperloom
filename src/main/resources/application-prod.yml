spring:
  application:
    name: paperloom
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

admin:
  bootstrap:
    enabled: false

app:
  auth:
    registration:
      mode: INVITE_ONLY
      invite-required: true

qdrant:
  base-url: ${QDRANT_BASE_URL}
  api-key: ${QDRANT_API_KEY:}
  collection: ${QDRANT_COLLECTION:paperloom_reading_locations_bm25_v1}

security:
  allowed-origins: ${SECURITY_ALLOWED_ORIGINS}

logging:
  level:
    org.springframework.web: INFO
    org.springframework.boot.autoconfigure.web.servlet: INFO
    org.springframework.security: INFO
    io.github.chzarles.paperloom: INFO
    io.minio: WARN
