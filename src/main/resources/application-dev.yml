server:
  port: ${SERVER_PORT:8081}
  address: 0.0.0.0

spring:
  application:
    name: paperloom
  # dev 用于本地源码启动，优先读取 `.env` 中的同名变量。
  jackson:
    time-zone: ${APP_TIMEZONE:Asia/Shanghai}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/paperloom?useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        jdbc:
          time_zone: ${APP_TIMEZONE:Asia/Shanghai}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  kafka:
    enabled: true
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      enable-idempotence: true
      transactional-id-prefix: paper-upload-tx-
      properties:
        client.dns.lookup: use_all_dns_ips
    consumer:
      group-id: paper-processing-group
      auto-offset-reset: earliest
      max-poll-records: ${SPRING_KAFKA_CONSUMER_MAX_POLL_RECORDS:1}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        client.dns.lookup: use_all_dns_ips
        max.poll.interval.ms: ${SPRING_KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS:7200000}
    listener:
      concurrency: ${SPRING_KAFKA_LISTENER_CONCURRENCY:3}
      auto-startup: ${SPRING_KAFKA_LISTENER_AUTO_STARTUP:true}
    topic:
      paper-processing: paper-processing-topic
      dlt: paper-processing-dlt
      # 分区数需要不小于 listener concurrency，才能真正并发消费
      partitions: ${SPRING_KAFKA_TOPIC_PARTITIONS:3}
      replication-factor: ${SPRING_KAFKA_TOPIC_REPLICATION_FACTOR:1}
  webflux:
    client:
      max-in-memory-size: 16MB
  codec:
    max-in-memory-size: 16MB

minio:
  # 本地 MinIO 默认端口 9000
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:}
  secretKey: ${MINIO_SECRET_KEY:}
  bucketName: ${MINIO_BUCKET_NAME:uploads}
  publicUrl: ${MINIO_PUBLIC_URL:http://localhost:9000}

jwt:
  secret-key: ${JWT_SECRET_KEY:}

admin:
  bootstrap:
    # 只在第一次初始化管理员时短暂开启
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    primary-org: ${ADMIN_BOOTSTRAP_PRIMARY_ORG:default}
    org-tags: ${ADMIN_BOOTSTRAP_ORG_TAGS:default,admin}

app:
  auth:
    registration:
      # 默认邀请码注册，避免开发环境误开放
      mode: ${APP_AUTH_REGISTRATION_MODE:INVITE_ONLY}
      invite-required: ${APP_AUTH_INVITE_REQUIRED:true}

rate-limit:
  register:
    max: ${RATE_LIMIT_REGISTER_MAX:20}
    window-seconds: ${RATE_LIMIT_REGISTER_WINDOW_SECONDS:600}
  login:
    max: ${RATE_LIMIT_LOGIN_MAX:30}
    window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
  chat-message:
    max: ${RATE_LIMIT_CHAT_MESSAGE_MAX:30}
    window-seconds: ${RATE_LIMIT_CHAT_MESSAGE_WINDOW_SECONDS:60}
  llm-request:
    minute-max: ${RATE_LIMIT_LLM_MINUTE_MAX:20}
    minute-window-seconds: ${RATE_LIMIT_LLM_MINUTE_WINDOW_SECONDS:60}
    day-max: ${RATE_LIMIT_LLM_DAY_MAX:500}
    day-window-seconds: ${RATE_LIMIT_LLM_DAY_WINDOW_SECONDS:86400}
  embedding-batch:
    minute-max: ${RATE_LIMIT_EMBEDDING_MINUTE_MAX:60}
    minute-window-seconds: ${RATE_LIMIT_EMBEDDING_MINUTE_WINDOW_SECONDS:60}
    day-max: ${RATE_LIMIT_EMBEDDING_DAY_MAX:2000}
    day-window-seconds: ${RATE_LIMIT_EMBEDDING_DAY_WINDOW_SECONDS:86400}

paper:
  parsing:
    provider: ${PAPER_PARSING_PROVIDER:mineru}
    chunk-size: 512
    overlap-size: 100
    min-chunk-size: 100
    opendataloader:
      reading-order: ${PAPER_PARSING_OPENDATALOADER_READING_ORDER:xycut}
      hybrid: ${PAPER_PARSING_OPENDATALOADER_HYBRID:off}
      image-output: ${PAPER_PARSING_OPENDATALOADER_IMAGE_OUTPUT:off}
      timeout-seconds: ${PAPER_PARSING_OPENDATALOADER_TIMEOUT_SECONDS:300}
    mineru:
      base-url: ${PAPER_PARSING_MINERU_BASE_URL:http://localhost:8000}
      health-path: ${PAPER_PARSING_MINERU_HEALTH_PATH:/health}
      health-timeout-seconds: ${PAPER_PARSING_MINERU_HEALTH_TIMEOUT_SECONDS:5}
      submit-path: ${PAPER_PARSING_MINERU_SUBMIT_PATH:/tasks}
      file-field-name: ${PAPER_PARSING_MINERU_FILE_FIELD_NAME:files}
      backend: ${PAPER_PARSING_MINERU_BACKEND:pipeline}
      parse-method: ${PAPER_PARSING_MINERU_PARSE_METHOD:auto}
      return-md: ${PAPER_PARSING_MINERU_RETURN_MD:true}
      return-content-list: ${PAPER_PARSING_MINERU_RETURN_CONTENT_LIST:true}
      return-middle-json: ${PAPER_PARSING_MINERU_RETURN_MIDDLE_JSON:true}
      response-format-zip: ${PAPER_PARSING_MINERU_RESPONSE_FORMAT_ZIP:true}
      status-path-template: ${PAPER_PARSING_MINERU_STATUS_PATH_TEMPLATE:/tasks/{taskId}}
      result-path-template: ${PAPER_PARSING_MINERU_RESULT_PATH_TEMPLATE:/tasks/{taskId}/result}
      timeout-seconds: ${PAPER_PARSING_MINERU_TIMEOUT_SECONDS:3600}
      poll-interval-seconds: ${PAPER_PARSING_MINERU_POLL_INTERVAL_SECONDS:3}

paperloom:
  trace:
    enabled: ${PAPERLOOM_TRACE_ENABLED:true}
    root: ${PAPERLOOM_TRACE_ROOT:data/traces/product-react}
    queue-capacity: ${PAPERLOOM_TRACE_QUEUE_CAPACITY:1000}
    writer-threads: ${PAPERLOOM_TRACE_WRITER_THREADS:1}

research-harness:
  base-url: ${RESEARCH_HARNESS_BASE_URL:http://127.0.0.1:8091}
  internal-token: ${RESEARCH_HARNESS_INTERNAL_TOKEN:}

qdrant:
  base-url: ${QDRANT_BASE_URL:http://127.0.0.1:6333}
  api-key: ${QDRANT_API_KEY:}
  collection: ${QDRANT_COLLECTION:paperloom_reading_locations_bm25_v1}

security:
  # 前端调试域名白名单，支持 Origin pattern
  allowed-origins: ${SECURITY_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

logging:
  level:
    org.springframework.web: ${LOG_LEVEL_WEB:DEBUG}
    org.springframework.boot.autoconfigure.web.servlet: ${LOG_LEVEL_AUTOCONFIG:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    io.github.chzarles.paperloom: ${LOG_LEVEL_APP:DEBUG}
    io.minio: ${LOG_LEVEL_MINIO:DEBUG}

deepseek:
  api:
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1}
    model: ${DEEPSEEK_API_MODEL:deepseek-chat}
    key: ${DEEPSEEK_API_KEY:}
