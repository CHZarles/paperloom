id: transformer_bert_gpt
title: "Transformer / BERT / GPT Pack"
purpose: "Test original-paper fact extraction, comparison, genealogy, contradiction arbitration, ambiguous attention references, and knowledge-boundary abstention."
capability_tags:
  - precision_fact_extraction
  - methodology_reproduction
  - deep_comparison
  - association_influence_genealogy
  - contradiction_resolution
  - ambiguity_resolution
  - uncertainty_knowledge_boundary
papers:
  - paper_id: attention_is_all_you_need_2017
    role: target
  - paper_id: adam_2014
    role: predecessor
  - paper_id: bert_2018
    role: successor
  - paper_id: gpt2_2019
    role: successor
  - paper_id: gpt3_2020
    role: hard_distractor
paper_records:
  - paper_id: attention_is_all_you_need_2017
    identity:
      title: "Attention Is All You Need"
      authors:
        - "Ashish Vaswani"
        - "Noam Shazeer"
      year: 2017
      venue: "NeurIPS"
      arxiv_id: "1706.03762"
      version_label: "arXiv/camera-ready"
    source_assets:
      parser: "paperloom-reading-model"
    ingest_expectations:
      requires_pdf_visual_assets: true
      requires_tables: true
      requires_figures: true
      requires_formulas: true
    metadata_quality:
      identity_status: "verified"
  - paper_id: adam_2014
    identity:
      title: "Adam: A Method for Stochastic Optimization"
      authors:
        - "Diederik P. Kingma"
        - "Jimmy Ba"
      year: 2014
      venue: "ICLR"
      arxiv_id: "1412.6980"
      version_label: "arXiv/camera-ready"
    metadata_quality:
      identity_status: "verified"
  - paper_id: bert_2018
    identity:
      title: "BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding"
      authors:
        - "Jacob Devlin"
        - "Ming-Wei Chang"
      year: 2018
      venue: "NAACL"
      arxiv_id: "1810.04805"
      version_label: "arXiv/camera-ready"
    metadata_quality:
      identity_status: "verified"
  - paper_id: gpt2_2019
    identity:
      title: "Language Models are Unsupervised Multitask Learners"
      authors:
        - "Alec Radford"
      year: 2019
      venue: "OpenAI technical report"
      version_label: "technical report"
    metadata_quality:
      identity_status: "verified"
  - paper_id: gpt3_2020
    identity:
      title: "Language Models are Few-Shot Learners"
      authors:
        - "Tom B. Brown"
      year: 2020
      venue: "NeurIPS"
      arxiv_id: "2005.14165"
      version_label: "arXiv/camera-ready"
    metadata_quality:
      identity_status: "verified"
citation_edges:
  - from_paper_id: bert_2018
    to_paper_id: attention_is_all_you_need_2017
    edge_type: "uses_transformer_encoder"
    evidence_anchor_id: bert_transformer_encoder_background
  - from_paper_id: gpt3_2020
    to_paper_id: gpt2_2019
    edge_type: "uses_gpt2_style_architecture"
    evidence_anchor_id: gpt3_uses_gpt2_architecture
  - from_paper_id: gpt2_2019
    to_paper_id: attention_is_all_you_need_2017
    edge_type: "uses_transformer_decoder_language_model"
    evidence_anchor_id: gpt2_transformer_language_model
evidence_anchors:
  - anchor_id: transformer_encoder_decoder_architecture
    paper_id: attention_is_all_you_need_2017
    role: supports
    element:
      type: abstract
      page: 1
      location_hint: "Transformer abstract"
    selector:
      regex: "encoder-decoder architecture"
    normalized_facts:
      architecture_role: "encoder-decoder architecture"
  - anchor_id: transformer_adam_training_params_span
    paper_id: attention_is_all_you_need_2017
    role: supports
    element:
      type: paragraph
      section: "Training"
      page: 7
      location_hint: "Optimizer hyperparameters"
    selector:
      exact_text: "We used the Adam optimizer with beta1 = 0.9, beta2 = 0.98 and epsilon = 10^-9."
      regex: "Adam optimizer.*beta_?1\\s*=\\s*0\\.9.*beta_?2\\s*=\\s*0\\.98.*epsilon\\s*=\\s*(10\\^-9|1e-9)"
    normalized_facts:
      adam_beta1: "0.9"
      adam_beta2: "0.98"
      adam_epsilon: "1e-9"
    asset_requirement:
      text: "required"
      pdf_page: "required"
    failure_if_missing:
      - "The answer may substitute default Adam values."
  - anchor_id: adam_default_beta2_span
    paper_id: adam_2014
    role: qualifies
    element:
      type: paragraph
      section: "Algorithm"
      page: 2
      location_hint: "Default Adam hyperparameters"
    selector:
      regex: "Good default settings.*beta_?1.*0\\.9.*beta_?2.*0\\.999"
    normalized_facts:
      adam_default_beta1: "0.9"
      adam_default_beta2: "0.999"
    asset_requirement:
      text: "required"
    failure_if_missing:
      - "The contradiction case cannot distinguish optimizer defaults from Transformer experiment settings."
  - anchor_id: bert_transformer_encoder_background
    paper_id: bert_2018
    role: background
    element:
      type: abstract
      page: 1
      location_hint: "BERT abstract"
    selector:
      regex: "bidirectional Transformer"
    normalized_facts:
      architecture_role: "bidirectional Transformer encoder"
  - anchor_id: bert_masked_lm_pretraining
    paper_id: bert_2018
    role: supports
    element:
      type: paragraph
      section: "Pre-training BERT"
      page: 4
      location_hint: "Masked LM objective"
    selector:
      regex: "Masked LM"
    normalized_facts:
      training_objective: "masked language modeling"
  - anchor_id: gpt2_transformer_language_model
    paper_id: gpt2_2019
    role: supports
    element:
      type: paragraph
      section: "Model"
      page: 3
      location_hint: "Transformer language model description"
    selector:
      regex: "Transformer.*language model"
    normalized_facts:
      architecture_role: "Transformer language model"
      training_objective: "left-to-right language modeling"
  - anchor_id: gpt3_uses_gpt2_architecture
    paper_id: gpt3_2020
    role: supports
    element:
      type: paragraph
      section: "Approach"
      page: 8
      location_hint: "GPT-3 architecture follows GPT-2"
    selector:
      regex: "same model and architecture as GPT-2"
    normalized_facts:
      architecture_lineage: "GPT-3 uses the same model and architecture family as GPT-2"
known_traps:
  - "Default Adam beta2=0.999 is a distractor for Transformer training hyperparameters."
  - "The phrase attention paper may mean several different papers."
  - "BERT's Transformer encoder role must not be collapsed with the original encoder-decoder architecture."
  - "GPT-3 architecture claims should be routed through the GPT-2 lineage anchor, not invented from memory."
