      - { paper_id: simclr_2020, title: "A Simple Framework for Contrastive Learning of Visual Representations", year: 2020, role: target }
      - { paper_id: clip_2021, title: "Learning Transferable Visual Models From Natural Language Supervision", year: 2021, role: target }
      - { paper_id: mae_2021, title: "Masked Autoencoders Are Scalable Vision Learners", year: 2021, role: target }
    distractor_papers:
