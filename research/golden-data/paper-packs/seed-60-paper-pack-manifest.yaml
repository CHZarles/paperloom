schema_version: harness-paper-pack-manifest/v1
source_selection: research/golden-data/seed-60-selection.yaml
purpose: "Initial required-paper and distractor manifest for authoring the Seed-60 harness benchmark."
curation_rules:
  - "Each pack is a paper situation, not a topic dump."
  - "Required papers are expected to provide gold evidence for at least one selected question."
  - "Distractors are included because a weak harness is likely to retrieve or cite them incorrectly."
  - "PDF and parsed-asset paths are intentionally deferred until collection begins."
packs:
  - id: transformer_bert_gpt
    title: "Transformer / BERT / GPT"
    serves_source_questions: [1, 2, 16, 31, 48, 56, 57, 61, 62, 77, 79, 118, 193, 203, 214, 223]
    required_papers:
      - { paper_id: attention_is_all_you_need_2017, title: "Attention Is All You Need", year: 2017, role: target }
      - { paper_id: bert_2018, title: "BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding", year: 2018, role: target }
      - { paper_id: gpt2_2019, title: "Language Models are Unsupervised Multitask Learners", year: 2019, role: predecessor }
      - { paper_id: gpt3_2020, title: "Language Models are Few-Shot Learners", year: 2020, role: target }
      - { paper_id: instructgpt_2022, title: "Training language models to follow instructions with human feedback", year: 2022, role: successor }
      - { paper_id: roberta_2019, title: "RoBERTa: A Robustly Optimized BERT Pretraining Approach", year: 2019, role: successor }
      - { paper_id: xlnet_2019, title: "XLNet: Generalized Autoregressive Pretraining for Language Understanding", year: 2019, role: successor }
    distractor_papers:
      - { paper_id: transformer_xl_2019, title: "Transformer-XL: Attentive Language Models Beyond a Fixed-Length Context", year: 2019, trap: "name collision with original Transformer" }
      - { paper_id: universal_transformer_2018, title: "Universal Transformers", year: 2018, trap: "Transformer variant, not original paper" }
      - { paper_id: vision_transformer_2020, title: "An Image is Worth 16x16 Words", year: 2020, trap: "Transformer in vision, not NLP origin" }
  - id: vision_architecture
    title: "Vision Architectures"
    serves_source_questions: [3, 12, 13, 32, 35, 44, 46, 64, 70, 76, 111, 115, 121, 130, 191, 197, 218]
    required_papers:
      - { paper_id: highway_networks_2015, title: "Highway Networks", year: 2015, role: predecessor }
      - { paper_id: resnet_2015, title: "Deep Residual Learning for Image Recognition", year: 2015, role: target }
      - { paper_id: resnet_v2_2016, title: "Identity Mappings in Deep Residual Networks", year: 2016, role: version_variant }
      - { paper_id: inception_v3_2015, title: "Rethinking the Inception Architecture for Computer Vision", year: 2015, role: target }
      - { paper_id: detr_2020, title: "End-to-End Object Detection with Transformers", year: 2020, role: target }
      - { paper_id: fcn_2015, title: "Fully Convolutional Networks for Semantic Segmentation", year: 2015, role: target }
      - { paper_id: unet_2015, title: "U-Net: Convolutional Networks for Biomedical Image Segmentation", year: 2015, role: target }
      - { paper_id: vit_2020, title: "An Image is Worth 16x16 Words", year: 2020, role: target }
      - { paper_id: swin_2021, title: "Swin Transformer: Hierarchical Vision Transformer using Shifted Windows", year: 2021, role: target }
    distractor_papers:
      - { paper_id: alexnet_2012, title: "ImageNet Classification with Deep Convolutional Neural Networks", year: 2012, trap: "classic baseline but not residual" }
      - { paper_id: vgg_2014, title: "Very Deep Convolutional Networks for Large-Scale Image Recognition", year: 2014, trap: "depth without residual learning" }
      - { paper_id: efficientnet_2019, title: "EfficientNet: Rethinking Model Scaling for Convolutional Neural Networks", year: 2019, trap: "efficient vision model, not mobile segmentation by itself" }
  - id: generative_models
