      - { paper_id: fasttext_2016, title: "Enriching Word Vectors with Subword Information", year: 2016, trap: "embedding successor" }
      - { paper_id: byol_2020, title: "Bootstrap Your Own Latent", year: 2020, trap: "self-supervised but no negative samples" }
