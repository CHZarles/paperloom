      - { paper_id: wgan_gp_2017, title: "Improved Training of Wasserstein GANs", year: 2017, role: successor }
      - { paper_id: ddpm_2020, title: "Denoising Diffusion Probabilistic Models", year: 2020, role: target }
      - { paper_id: latent_diffusion_2022, title: "High-Resolution Image Synthesis with Latent Diffusion Models", year: 2022, role: successor }
      - { paper_id: consistency_models_2023, title: "Consistency Models", year: 2023, role: successor }
      - { paper_id: stylegan2_2019, title: "Analyzing and Improving the Image Quality of StyleGAN", year: 2019, role: target }
    distractor_papers:
