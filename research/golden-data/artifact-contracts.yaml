schema_version: research-harness-artifacts/v2
purpose: "Contracts for the skill-guided ReAct run, its inspectable evidence, and its final answer."
artifact_order:
  - HarnessRun
  - EvidenceLedger
  - ResearchAnswer
  - ScoreReport
shared_enums:
  execution_status:
    - COMPLETED
    - NEEDS_CLARIFICATION
    - INCOMPLETE_PRECISE
    - FAILED_TECHNICAL
  research_outcome:
    - answered
    - needs_clarification
    - abstained
    - partial
artifacts:
  - id: HarnessRun
    purpose: "One conversation turn executed by the skill-guided ReAct harness."
    required_fields:
      - schema_version
      - run_id
      - question_id
      - case_id
      - harness_id
      - status
      - skills_used
      - react_trace
      - evidence_ledger
      - citation_validation
      - research_answer
      - diagnostics
    invariants:
      - "status, result_status when present, and ResearchAnswer.status agree."
      - "skills_used and react_trace are optional inspection data, not execution stages or golden expectations."
      - "A research turn is finished only through submit_research_answer."
  - id: EvidenceLedger
    purpose: "Passages actually read during this turn or restored from persisted conversation evidence."
    required_fields:
      - ledger_id
      - question_id
      - items
      - rejected_items
      - missing_evidence
    item_required_fields:
      - evidence_id
      - paper_id
      - title
      - paper_version
      - section
      - page
      - location
      - element_type
      - span_text
      - retrieval_strategy
      - evidence_quality
    invariants:
      - "Candidate papers and location previews are navigation data, not citeable evidence."
      - "Every cited evidence id resolves to a citeable item in this ledger or persisted conversation evidence."
  - id: ResearchAnswer
    purpose: "Natural user-facing answer submitted by the model and accepted by the citation gate."
    required_fields:
      - answer_id
      - question_id
      - status
      - outcome
      - answer_type
      - summary
      - markdown
      - fields
      - cited_evidence_ids
    invariants:
      - "User-visible prose does not expose tool names, skill ids, schema labels, or internal statuses."
      - "A corpus-grounded answered or partial result contains at least one valid citation."
  - id: ScoreReport
    purpose: "Eval-only deterministic behavior scoring against golden expectations."
    required_fields:
      - schema_version
      - dataset_id
      - case_count
      - passed_count
      - failed_count
      - scores
    dimensions:
      - outcome
      - retrieval
      - content
      - grounding
    invariants:
      - "Scoring does not grade skill selection, tool order, tool count, or exact prose."
      - "Structured fields are checked when present; semantic correctness of prose is an LLM-judge concern."
      - "LLM-as-judge remains a separate offline evaluation step."
