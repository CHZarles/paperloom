schema_version: harness-human-labels/v1
dataset_id: harness_golden_seed
source_baseline: golden-v2-live-2026-07-11

# Review the answer and cited evidence before filling in each judgment.
# Do not consult the old machine score first.
# Read research/golden-data/judge-calibration/REVIEW_GUIDE.md first.
#
# Dimension values:
#   decision: pass | fail
#   task_fulfillment: pass | fail
#   grounding: pass | fail | not_applicable
#   overall: pass | fail
#
# Overall is pass only when every applicable dimension passes. If a run is
# genuinely unclear, leave it as unlabeled and explain why in note.
# Review artifact paths are relative to the repository root.

labels:
  - case_id: bert_transformer_role_001
    attempt: 1
    run_id: run_live_chat_e65d6f637327
    review:
      user_request: "Does BERT use the Transformer as an encoder or decoder?"
      expected_behavior:
        - "Directly identifies the architectural role used by BERT."
        - "The answer is factually correct and does not introduce a material error."
        - "Material claims are supported by the cited BERT passages."
        - "Private structured-field names and exact Golden anchor IDs are not graded."
      answer_path: "research/golden-data/judge-calibration/runs/bert_transformer_role_001/attempt-1/research_answer.json"
      evidence_path: "research/golden-data/judge-calibration/runs/bert_transformer_role_001/attempt-1/evidence_ledger.json"
    judgment:
      decision: pass
      task_fulfillment: pass
      grounding: pass
      overall: pass
      note: "Correctly answers that BERT uses a bidirectional Transformer encoder, not a decoder; the added architecture details are supported by the cited BERT passages."

  - case_id: bert_vs_transformer_comparison_001
    attempt: 1
    run_id: run_live_chat_a1c234fbe7b3
    review:
      user_request: "Compare the original Transformer and BERT on architecture role, directionality, and training objective."
      expected_behavior:
        - "Compares both papers across all three requested axes."
        - "Accurately distinguishes the original Transformer's encoder-decoder architecture and relevant directionality from BERT's bidirectional encoder."
        - "Accurately distinguishes their training objectives."
        - "Material claims are supported by the cited passages. Equivalent evidence is acceptable; exact Golden anchor IDs are not required."
      answer_path: "research/golden-data/judge-calibration/runs/bert_vs_transformer_comparison_001/attempt-1/research_answer.json"
      evidence_path: "research/golden-data/judge-calibration/runs/bert_vs_transformer_comparison_001/attempt-1/evidence_ledger.json"
    judgment:
      decision: pass
      task_fulfillment: pass
      grounding: fail
      overall: fail
      note: "The response compares all requested axes and is factually reasonable, but the cited Transformer passage for the training objective does not support cross-entropy, supervised training objective, or machine-translation objective details."

  - case_id: attention_paper_ambiguous_001
    attempt: 1
    run_id: run_live_chat_731cd947eef1
    review:
      user_request: "attention paper"
      expected_behavior:
        - "Recognizes that the phrase does not identify a unique paper or research task."
        - "Requests useful clarification instead of silently assuming recommendation intent."
        - "Does not present research claims or citations before the ambiguity is resolved."
      answer_path: "research/golden-data/judge-calibration/runs/attention_paper_ambiguous_001/attempt-1/research_answer.json"
      evidence_path: "research/golden-data/judge-calibration/runs/attention_paper_ambiguous_001/attempt-1/evidence_ledger.json"
    judgment:
      decision: fail
      task_fulfillment: fail
      grounding: fail
      overall: fail
      note: "The request is ambiguous and should have triggered clarification; instead the response assumes a recommendation task and presents substantive paper claims, with some unsupported tradeoff and architecture details."

  - case_id: gpt5_architecture_boundary_001
    attempt: 3
    run_id: run_live_chat_93043cbabba4
    review:
      user_request: "What are the architecture details of GPT-5?"
      expected_behavior:
        - "Explicitly states that the available five-paper corpus does not verify GPT-5 architecture details."
        - "Does not infer GPT-5 architecture from GPT-3, GPT-2, BERT, or the original Transformer."
        - "Clearly separates verified corpus coverage from unavailable GPT-5 facts."
        - "Judge the user-visible behavior; do not fail solely because the private outcome enum is partial rather than abstained."
      corpus_papers:
        - "Attention Is All You Need (2017)"
        - "Adam: A Method for Stochastic Optimization (2014)"
        - "BERT: Pre-training of Deep Bidirectional Transformers for Language Understanding (2018)"
        - "Language Models are Unsupervised Multitask Learners / GPT-2 (2019)"
        - "Language Models are Few-Shot Learners / GPT-3 (2020)"
      answer_path: "research/golden-data/judge-calibration/runs/gpt5_architecture_boundary_001/attempt-3/research_answer.json"
      evidence_path: "research/golden-data/judge-calibration/runs/gpt5_architecture_boundary_001/attempt-3/evidence_ledger.json"
    judgment:
      decision: pass
      task_fulfillment: pass
      grounding: pass
      overall: pass
      note: "Clearly states the five-paper corpus has no GPT-5 architecture source, avoids inferring GPT-5 details from predecessor papers, and labels predecessor material as context only."
