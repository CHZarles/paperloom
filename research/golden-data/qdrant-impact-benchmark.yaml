schema_version: harness-qdrant-impact-benchmark/v1

dataset:
  manifest: research/golden-data/manifest-expanded.yaml
  saved_minimax_runs: research/golden-data/validation-runs/2026-07-14-single-path-model-comparison-v1/minimax-m3
  saved_query_fills:
    mint_vs_tau_interaction_comparison_001: research/golden-data/validation-runs/2026-07-13-llm-agent-evaluation-v1

embedding:
  provider_source: docker_mysql
  env_path: .env
  mysql_container_env: HARNESS_MYSQL_CONTAINER
  default_mysql_container: pai_smart_mysql
  # Match the Java product indexer's document embedding batch size.
  batch_size: 10
  request_timeout_seconds: 90
  query_min_interval_seconds: 1.05
  retry:
    max_attempts: 3
    initial_backoff_seconds: 1.0
    max_backoff_seconds: 8.0

qdrant:
  base_url_env: QDRANT_BASE_URL
  default_base_url: http://127.0.0.1:6333
  api_key_env: QDRANT_API_KEY
  container_env: PAPERLOOM_QDRANT_CONTAINER
  default_container: paperloom-qdrant
  collection: paperloom_golden_qdrant_impact_v1
  request_timeout_seconds: 30
  retry:
    max_attempts: 4
    initial_backoff_seconds: 0.25
    max_backoff_seconds: 2.0
  upsert_batch_size: 64

retrieval:
  # Frozen retrieval diagnostic only. These exact Anchors never affect v4 answer scoring.
  audit_anchor_ids_by_case:
    transformer_adam_params_001: [transformer_adam_training_params_span]
    bert_transformer_role_001: [bert_transformer_encoder_background]
    bert_vs_transformer_comparison_001:
      - transformer_encoder_decoder_architecture
      - bert_transformer_encoder_background
      - bert_masked_lm_pretraining
    transformer_to_bert_genealogy_001: [bert_transformer_encoder_background]
    adam_beta2_conflict_001: [transformer_adam_training_params_span, adam_default_beta2_span]
    transformer_optimizer_reproduction_001: [transformer_adam_training_params_span]
    gpt3_to_transformer_multihop_001: [gpt3_uses_gpt2_architecture, gpt2_transformer_language_model]
    bert_choice_followup_001: [bert_transformer_encoder_background]
    transformer_bert_confirmation_followup_001:
      - transformer_encoder_decoder_architecture
      - bert_transformer_encoder_background
      - bert_masked_lm_pretraining
    adam_constraint_refinement_followup_001: [transformer_adam_training_params_span]
    agentbench_environment_inventory_001: [agentbench_eight_environments, agentbench_failure_obstacles]
    gaia_dataset_gap_001: [gaia_question_construction, gaia_human_gpt4_gap]
    webarena_reproduction_protocol_001:
      - webarena_four_self_hosted_domains
      - webarena_deterministic_initial_state
      - webarena_functional_correctness_tasks
    swebench_instance_provenance_001: [swebench_issue_pr_provenance, swebench_patch_test_construction]
    agentboard_progress_metric_001: [agentboard_final_success_rate_limit, agentboard_progress_rate_metric]
    mint_vs_tau_interaction_comparison_001:
      - mint_tools_feedback_protocol
      - tau_database_end_state_evaluation
      - tau_passk_reliability
    toolsandbox_constraint_selection_001: [toolsandbox_stateful_on_policy_design, toolsandbox_challenge_categories]
    cross_benchmark_human_agent_gap_001: [gaia_human_gpt4_gap, webarena_gpt4_human_gap]
    agent_evaluation_recommendation_001:
      - gaia_question_construction
      - webarena_four_self_hosted_domains
      - swebench_patch_test_construction
      - tau_database_end_state_evaluation
    react_to_agent_evaluation_genealogy_001:
      - react_interleaved_reasoning_actions
      - agentbench_react_pioneer_relationship
      - tau_react_baseline_relationship
    mint_tau_apparent_conflict_001: [mint_tools_feedback_gains, tau_passk_reliability]
    coding_benchmark_followup_001: [swebench_issue_pr_provenance]
    cross_benchmark_score_ranking_partial_001:
      - gaia_human_gpt4_gap
      - webarena_gpt4_human_gap
      - swebench_claude2_baseline
    benchmark_topic_change_followup_001: [swebench_patch_test_construction]
  cutoffs: [1, 5, 8, 12]
  default_native_top_k: 8
  max_top_k: 20
  rrf_k: 60
  candidate_limit_min: 40
  candidate_limit_multiplier: 4
  candidate_limit_max: 100
  per_paper_limit_min: 8
  per_paper_limit_multiplier: 2
  per_paper_limit_max: 40
  per_paper_search_max_papers: 8
  element_type_hint_boost: 0.001

artifacts:
  root: research/golden-data/local-runs
  run_prefix: qdrant-impact
