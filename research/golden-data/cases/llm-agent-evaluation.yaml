cases:
  - schema_version: harness-golden-case/v2
    id: agentbench_environment_inventory_001
    split: seed
    paradigm: data_benchmark_provenance
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "What does AgentBench evaluate, how many environments does it contain, and which agent weaknesses does the paper identify?"
    expect:
      outcome: answered
      papers:
        required: [agentbench_2024]
        forbidden: [agentboard_2024]
      evidence:
        required: [agentbench_eight_environments, agentbench_failure_obstacles]
        forbidden: [agentboard_progress_rate_metric]
      facts:
        environment_count: "8"
      claims:
        - text: "AgentBench evaluates LLM agents in eight interactive environments."
          evidence: [agentbench_eight_environments]
        - text: "The paper identifies weak long-term reasoning, decision-making, and instruction following as major obstacles."
          evidence: [agentbench_failure_obstacles]
      citations: required

  - schema_version: harness-golden-case/v2
    id: gaia_dataset_gap_001
    split: seed
    paradigm: data_benchmark_provenance
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Explain how the GAIA benchmark was constructed and give the reported human versus GPT-4-with-plugins result."
    expect:
      outcome: answered
      papers:
        required: [gaia_2024]
        forbidden: [webarena_2024]
      evidence:
        required: [gaia_question_construction, gaia_human_gpt4_gap]
        forbidden: [webarena_gpt4_human_gap]
      facts:
        question_count: "466"
        human_success_rate: "92%"
        gpt4_plugins_success_rate: "15%"
      citations: required
    review:
      - "Attributes the 92% and 15% figures to GAIA rather than treating them as general agent performance numbers."

  - schema_version: harness-golden-case/v2
    id: webarena_reproduction_protocol_001
    split: seed
    paradigm: methodology_reproduction
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Give me a concise WebArena reproduction checklist covering its web domains, environment reset, task execution, and evaluation criterion."
    expect:
      outcome: answered
      papers:
        required: [webarena_2024]
        forbidden: [gaia_2024]
      evidence:
        required:
          - webarena_four_self_hosted_domains
          - webarena_deterministic_initial_state
          - webarena_functional_correctness_tasks
        forbidden: [gaia_question_construction]
      facts:
        application_count: "4"
      citations: required
    review:
      - "Presents an executable checklist rather than a general summary of WebArena."

  - schema_version: harness-golden-case/v2
    id: swebench_instance_provenance_001
    split: seed
    paradigm: data_benchmark_provenance
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Trace how an original SWE-bench task is created from GitHub data and explain how a generated patch is evaluated."
    expect:
      outcome: answered
      papers:
        required: [swebench_2024]
        forbidden: [react_2023]
      evidence:
        required: [swebench_issue_pr_provenance, swebench_patch_test_construction]
        forbidden: [react_interleaved_reasoning_actions]
      claims:
        - text: "SWE-bench connects GitHub issues with merged pull-request solutions and evaluates generated patches against tests."
          evidence: [swebench_issue_pr_provenance, swebench_patch_test_construction]
      citations: required

  - schema_version: harness-golden-case/v2
    id: agentboard_progress_metric_001
    split: seed
    paradigm: contribution_summary_critical_assessment
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Why does AgentBoard argue that final success rate is insufficient, and what does its progress-rate metric add?"
    expect:
      outcome: answered
      papers:
        required: [agentboard_2024]
        forbidden: [agentbench_2024]
      evidence:
        required: [agentboard_final_success_rate_limit, agentboard_progress_rate_metric]
        forbidden: [agentbench_eight_environments]
      claims:
        - text: "Final success rate exposes little about intermediate behavior, while progress rate captures incremental task advancement."
          evidence: [agentboard_final_success_rate_limit, agentboard_progress_rate_metric]
      citations: required

  - schema_version: harness-golden-case/v2
    id: agent_benchmark_ambiguous_001
    split: seed
    paradigm: ambiguity_resolution
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "agent benchmark"
    expect:
      outcome: needs_clarification
      citations: forbidden
    review:
      - "Asks whether the user needs general-assistant, web, coding, multi-turn, or policy-constrained tool-agent evaluation."
      - "Does not silently choose one benchmark or begin presenting research claims."

  - schema_version: harness-golden-case/v2
    id: mint_vs_tau_interaction_comparison_001
    split: stress
    paradigm: deep_comparison
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Compare MINT and tau-bench on interaction design, tool use, feedback, environment state, and reliability measurement."
    expect:
      outcome: answered
      papers:
        required: [mint_2024, tau_bench_2024]
        forbidden: [agentbench_2024]
      evidence:
        required:
          - mint_tools_feedback_protocol
          - tau_database_end_state_evaluation
          - tau_passk_reliability
        forbidden: [agentbench_eight_environments]
      citations: required
    review:
      - "Uses aligned comparison axes and distinguishes MINT's feedback protocol from tau-bench's state and reliability evaluation."

  - schema_version: harness-golden-case/v2
    id: toolsandbox_constraint_selection_001
    split: stress
    paradigm: complex_constraint_combination
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Choose the benchmark in this corpus that combines stateful tools, on-policy conversation, intermediate milestones, and insufficient-information scenarios. Explain why it fits."
    expect:
      outcome: answered
      papers:
        required: [toolsandbox_2024]
        forbidden: [mint_2024, tau_bench_2024]
      evidence:
        required: [toolsandbox_stateful_on_policy_design, toolsandbox_challenge_categories]
        forbidden: [mint_tools_feedback_protocol, tau_database_end_state_evaluation]
      claims:
        - text: "ToolSandbox satisfies the combined stateful, on-policy, milestone-based, and insufficient-information constraints."
          evidence: [toolsandbox_stateful_on_policy_design, toolsandbox_challenge_categories]
      citations: required

  - schema_version: harness-golden-case/v2
    id: cross_benchmark_human_agent_gap_001
    split: stress
    paradigm: boundaries_failures_counterexamples
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Compare the reported human-agent gaps in GAIA and WebArena, but do not imply that their percentages are directly interchangeable."
    expect:
      outcome: answered
      papers:
        required: [gaia_2024, webarena_2024]
        forbidden: [swebench_2024]
      evidence:
        required: [gaia_human_gpt4_gap, webarena_gpt4_human_gap]
        forbidden: [swebench_claude2_baseline]
      citations: required
    review:
      - "Reports both gaps accurately and explains that the benchmarks use different tasks and evaluation settings."

  - schema_version: harness-golden-case/v2
    id: agent_evaluation_recommendation_001
    split: stress
    paradigm: meta_analysis_systematic_review
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Recommend one benchmark each for general assistants, realistic web tasks, software engineering, and policy-constrained tool-agent interaction."
    expect:
      outcome: answered
      papers:
        required: [gaia_2024, webarena_2024, swebench_2024, tau_bench_2024]
      evidence:
        required:
          - gaia_question_construction
          - webarena_four_self_hosted_domains
          - swebench_patch_test_construction
          - tau_database_end_state_evaluation
      citations: required
    review:
      - "Maps GAIA, WebArena, SWE-bench, and tau-bench to the four requested scenarios with grounded reasons."

  - schema_version: harness-golden-case/v2
    id: react_to_agent_evaluation_genealogy_001
    split: stress
    paradigm: association_influence_genealogy
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Trace only directly verified relationships from ReAct into later agent-evaluation papers in this corpus. Do not infer influence from topical similarity."
    expect:
      outcome: answered
      papers:
        required: [react_2023, agentbench_2024, tau_bench_2024]
      evidence:
        required:
          - react_interleaved_reasoning_actions
          - agentbench_react_pioneer_relationship
          - tau_react_baseline_relationship
      claims:
        - text: "AgentBench describes ReAct as combining reasoning and actions for agent tasks."
          evidence: [agentbench_react_pioneer_relationship]
        - text: "tau-bench directly evaluates ReAct as a simple agent construction."
          evidence: [tau_react_baseline_relationship]
      citations: required

  - schema_version: harness-golden-case/v2
    id: mint_tau_apparent_conflict_001
    split: stress
    paradigm: contradiction_resolution
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "MINT reports gains from tools and language feedback, while tau-bench reports poor multi-trial reliability. Are these findings contradictory?"
    expect:
      outcome: answered
      papers:
        required: [mint_2024, tau_bench_2024]
      evidence:
        required: [mint_tools_feedback_gains, tau_passk_reliability]
      claims:
        - text: "The findings are not contradictory because MINT measures gains from interaction support while tau-bench measures repeated-trial reliability in stateful tasks."
          evidence: [mint_tools_feedback_gains, tau_passk_reliability]
      citations: required
    review:
      - "Does not invent a shared model, task distribution, or metric that would make the reported numbers directly comparable."

  - schema_version: harness-golden-case/v2
    id: coding_benchmark_followup_001
    split: stress
    paradigm: context_specific_brainstorming
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Help me choose one benchmark: GAIA for general assistants, WebArena for web agents, or SWE-bench for coding agents."
      - role: assistant
        content: "Which target matters most: general assistance, web interaction, or software engineering?"
      - role: user
        content: "The coding one."
    expect:
      outcome: answered
      papers:
        required: [swebench_2024]
        forbidden: [gaia_2024, webarena_2024]
      evidence:
        required: [swebench_issue_pr_provenance]
        forbidden: [gaia_question_construction, webarena_four_self_hosted_domains]
      citations: required

  - schema_version: harness-golden-case/v2
    id: cross_benchmark_score_ranking_partial_001
    split: stress
    paradigm: uncertainty_knowledge_boundary
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Rank GAIA, WebArena, and SWE-bench from easiest to hardest using only their reported model success percentages."
    expect:
      outcome: partial
      papers:
        required: [gaia_2024, webarena_2024, swebench_2024]
      evidence:
        required: [gaia_human_gpt4_gap, webarena_gpt4_human_gap, swebench_claude2_baseline]
      citations: required
    review:
      - "Provides the reported figures but declines a strict difficulty ranking because the models, tasks, and metrics differ."

  - schema_version: harness-golden-case/v2
    id: benchmark_topic_change_followup_001
    split: stress
    paradigm: context_specific_brainstorming
    paper_pack: llm_agent_evaluation
    messages:
      - role: user
        content: "Which benchmark should I use for a general AI assistant?"
      - role: assistant
        content: "GAIA is the direct fit for general-assistant evaluation."
      - role: user
        content: "Actually, I need to evaluate an agent that fixes GitHub issues."
    expect:
      outcome: answered
      papers:
        required: [swebench_2024]
        forbidden: [gaia_2024]
      evidence:
        required: [swebench_patch_test_construction]
        forbidden: [gaia_question_construction]
      citations: required
    review:
      - "Follows the topic change to SWE-bench instead of continuing the GAIA recommendation."
